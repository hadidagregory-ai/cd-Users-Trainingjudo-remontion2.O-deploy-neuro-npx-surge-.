<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Programme Neuro Judoka — TrainingJudo</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#FF5757;--orange:#FFBD59;--green:#7ED957;
  --bg:#0F0F0F;--card:#1A1A1A;--card2:#222;--border:#2D2D2D;
  --white:#F5F5F5;--gray:#9CA3AF;--dim:#4B5563;
  --radius:14px;--font:system-ui,-apple-system,sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--white);min-height:100vh;font-size:15px;line-height:1.5}

/* ── HEADER ─────────────────────────────────────────── */
.header{
  position:sticky;top:0;z-index:100;
  background:rgba(15,15,15,0.96);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 20px;
}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:16px}
.logo{font-size:17px;font-weight:900;letter-spacing:0.05em;color:var(--white);white-space:nowrap}
.logo span{color:var(--red)}
.progress-wrap{flex:1;display:flex;flex-direction:column;gap:4px}
.progress-label{font-size:11px;font-weight:700;color:var(--gray);letter-spacing:0.1em;display:flex;justify-content:space-between}
.progress-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(to right,var(--red),var(--orange));transition:width .5s ease}

/* ── NAME INPUT ──────────────────────────────────────── */
.name-wrap{display:flex;align-items:center;gap:8px;flex-shrink:0}
.name-input{
  background:var(--card2);border:1px solid var(--border);border-radius:8px;
  color:var(--white);font-family:var(--font);font-size:13px;font-weight:700;
  padding:6px 12px;width:140px;outline:none;transition:border-color .15s;
}
.name-input:focus{border-color:var(--orange)}
.name-input::placeholder{color:var(--dim);font-weight:400}
.name-label{font-size:10px;font-weight:700;letter-spacing:0.15em;color:var(--dim);text-transform:uppercase;white-space:nowrap}

/* ── SHEETS STATUS ───────────────────────────────────── */
.sheets-dot{
  width:8px;height:8px;border-radius:50%;background:var(--dim);flex-shrink:0;
  transition:background .3s;
}
.sheets-dot.ok{background:var(--green)}
.sheets-dot.err{background:var(--red)}
.sheets-dot.loading{background:var(--orange);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MAIN LAYOUT ─────────────────────────────────────── */
.container{max-width:900px;margin:0 auto;padding:24px 20px 80px}

/* ── PHASE BAR ───────────────────────────────────────── */
.phase-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.phase-btn{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px 8px;text-align:center;cursor:pointer;transition:.2s;
}
.phase-btn:hover{border-color:var(--dim)}
.phase-btn.active{border-color:var(--orange)}
.phase-name{font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gray);margin-bottom:6px}
.phase-weeks{display:flex;justify-content:center;gap:4px;flex-wrap:wrap}
.week-dot{
  width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;cursor:pointer;transition:.15s;
  background:var(--border);color:var(--gray);border:2px solid transparent;
}
.week-dot:hover{background:var(--dim);color:var(--white)}
.week-dot.current{background:var(--red);color:#0F0F0F;border-color:transparent}
.week-dot.done{background:rgba(126,217,87,0.2);color:var(--green);border-color:var(--green)}

/* ── WEEK HEADER ─────────────────────────────────────── */
.week-header{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;margin-bottom:16px}
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.week-nav-btn{
  background:var(--card2);border:1px solid var(--border);border-radius:8px;
  padding:6px 14px;font-size:13px;font-weight:700;color:var(--gray);cursor:pointer;transition:.15s;
}
.week-nav-btn:hover:not(:disabled){background:var(--border);color:var(--white)}
.week-nav-btn:disabled{opacity:0.3;cursor:default}
.week-badge{display:flex;align-items:center;gap:10px}
.week-tag{background:var(--red);color:#0F0F0F;font-size:11px;font-weight:900;padding:4px 12px;border-radius:6px;letter-spacing:0.1em;text-transform:uppercase}
.phase-tag{font-size:11px;font-weight:700;color:var(--orange);letter-spacing:0.15em;text-transform:uppercase}
.week-title{font-size:24px;font-weight:900;letter-spacing:-0.02em;margin-bottom:6px}
.week-goal{font-size:13px;color:var(--gray);line-height:1.5;padding:10px 14px;background:var(--card2);border-radius:8px;border-left:3px solid var(--orange)}
.week-progress-row{display:flex;align-items:center;gap:10px;margin-top:14px}
.week-progress-bar{flex:1;height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.week-progress-fill{height:100%;border-radius:99px;background:var(--green);transition:width .4s ease}
.week-progress-label{font-size:11px;font-weight:700;color:var(--green);min-width:32px;text-align:right}

/* ── SÉANCE CARDS ────────────────────────────────────── */
.seance-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:12px;overflow:hidden}
.seance-header{
  display:flex;align-items:center;gap:14px;padding:16px 20px;cursor:pointer;
  transition:background .15s;user-select:none;
}
.seance-header:hover{background:var(--card2)}
.seance-num{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:900;color:#0F0F0F;
}
.seance-info{flex:1}
.seance-title{font-size:15px;font-weight:800;color:var(--white);margin-bottom:2px}
.seance-meta{display:flex;gap:8px;align-items:center}
.seance-time{font-size:11px;font-weight:700;color:var(--gray)}
.seance-tag-pill{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:2px 8px;border-radius:20px}
.seance-check{width:22px;height:22px;flex-shrink:0}
.seance-check input{width:22px;height:22px;accent-color:var(--green);cursor:pointer}
.seance-chevron{font-size:12px;color:var(--dim);transition:transform .25s;flex-shrink:0}
.seance-card.open .seance-chevron{transform:rotate(180deg)}

.seance-body{display:none;padding:0 20px 20px;border-top:1px solid var(--border)}
.seance-card.open .seance-body{display:block}

/* ── EXERCISES ───────────────────────────────────────── */
.exo-list{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.exo{background:var(--card2);border-radius:10px;padding:14px 16px;border-left:3px solid var(--border)}
.exo-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
.exo-icon{font-size:20px;line-height:1;flex-shrink:0;margin-top:1px}
.exo-name{font-size:13px;font-weight:800;color:var(--white);line-height:1.2}
.exo-dose{font-size:11px;font-weight:700;color:var(--orange);margin-top:2px}
.exo-steps{list-style:none;display:flex;flex-direction:column;gap:5px}
.exo-steps li{font-size:12.5px;color:var(--gray);line-height:1.45;display:flex;gap:8px}
.exo-step-num{
  min-width:18px;height:18px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:9px;font-weight:900;color:#0F0F0F;flex-shrink:0;margin-top:1px;
}
.exo-why{font-size:11.5px;color:var(--dim);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.exo-why strong{color:var(--gray);font-style:normal}

/* ── FEEDBACK ────────────────────────────────────────── */
.feedback-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-top:16px}
.feedback-title{font-size:15px;font-weight:800;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.feedback-subtitle{font-size:12px;color:var(--gray);margin-bottom:14px}
.feedback-q{font-size:13px;font-weight:700;color:var(--orange);margin-top:12px;padding:10px 14px;background:var(--card2);border-radius:8px;border-left:3px solid var(--orange)}
.feedback-q:first-of-type{margin-top:8px}

/* ── PROGRESS DASHBOARD ──────────────────────────────── */
.dashboard{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px}
.dashboard-title{font-size:15px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dash-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px}
.dash-week{
  aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;transition:.15s;
  background:var(--card2);border:1px solid var(--border);
  font-size:11px;font-weight:800;color:var(--gray);
}
.dash-week:hover{border-color:var(--dim);color:var(--white)}
.dash-week.current-dash{border-color:var(--red);color:var(--red)}
.dash-week.done-dash{background:rgba(126,217,87,0.12);border-color:var(--green);color:var(--green)}
.dash-check{font-size:14px;line-height:1}

/* ── PHASE TITLE ─────────────────────────────────────── */
.phase-divider{text-align:center;margin:18px 0 10px;font-size:11px;font-weight:700;letter-spacing:0.3em;color:var(--dim);text-transform:uppercase}

/* ── MOBILE ──────────────────────────────────────────── */
@media(max-width:600px){
  .phase-bar{grid-template-columns:repeat(2,1fr)}
  .dash-grid{grid-template-columns:repeat(6,1fr)}
  .week-title{font-size:19px}
}
</style>
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo">TRAINING<span>JUDO</span></div>
    <div class="progress-wrap">
      <div class="progress-label">
        <span>PROGRESSION GLOBALE</span>
        <span id="global-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="global-fill" style="width:0%"></div></div>
    </div>
    <div class="name-wrap">
      <span class="name-label">Judoka</span>
      <input class="name-input" id="judoka-name" type="text" placeholder="Ton prénom" maxlength="30"
        oninput="saveJudokaName(this.value)" autocomplete="off"/>
      <div class="sheets-dot" id="sheets-dot" title="Statut Google Sheets"></div>
    </div>
  </div>
</header>

<div class="container">
  <!-- Dashboard progression -->
  <div class="dashboard">
    <div class="dashboard-title">📊 Mes 12 semaines</div>
    <div class="dash-grid" id="dash-grid"></div>
  </div>

  <!-- Phase bar -->
  <div class="phase-bar" id="phase-bar"></div>

  <!-- Week content -->
  <div id="week-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════
// DONNÉES DU PROGRAMME
// ═══════════════════════════════════════════════
const PHASES=[
  {name:"Calibrage",weeks:[1,2,3],color:"var(--orange)"},
  {name:"Construction",weeks:[4,5,6],color:"var(--green)"},
  {name:"Pression",weeks:[7,8,9],color:"var(--red)"},
  {name:"Peak",weeks:[10,11,12],color:"var(--orange)"},
];

// Matériel utilisé dans les exercices — tout disponible à la maison :
// • Jeu de cartes ou objets colorés (rouge/orange/vert/bleu)
// • Dé à 6 faces
// • Chronomètre (téléphone)
// • Partenaire (parent, copine, ami) pour les signaux aléatoires
// • Stylo + carnet

const PROGRAM={
  1:{
    title:"Calibrage — Découvrir ses lignes de base",
    goal:"Mesurer où tu en es aujourd'hui sur 3 capacités clés : réaction visuelle, attention et régulation du stress. Pas de performance à atteindre — juste observer et noter.",
    seances:[
      {
        title:"Réaction Visuelle — Test de Base",duration:15,color:"var(--red)",tag:"Entrée visuelle",
        exos:[
          {icon:"🃏",name:"Jeu de Cartes Réaction",dose:"3 séries × 10 cartes — note ton score",
           steps:["Partenaire tient un jeu de cartes face cachée","Il retourne une carte : rouge = tu frappes dans les mains UNE FOIS, noir = tu restes immobile","Compter les bonnes réponses sur 10 — note le score dans un carnet","Règle simple : si tu bouges sur une carte noire, c'est raté","Mesure ce que tu fais VRAIMENT, pas ce que tu penses faire"],
           why:"Développe la voie visuo-motrice — la vitesse à laquelle ton cerveau traite une information visuelle et déclenche (ou bloque) une réponse motrice. C'est le mécanisme de base derrière chaque entrée en technique."},
          {icon:"⏱",name:"Chrono de Réaction Brute",dose:"10 essais — note la moyenne",
           steps:["Partenaire tient une règle ou un stylo verticalement entre tes doigts ouverts (main à hauteur de poitrine)","Il lâche sans te prévenir — tu l'attrapes le plus vite possible","Mesure le niveau auquel tu l'attrapes (plus haut = plus lent)","Note la distance en cm sur les 10 essais — calcule la moyenne","C'est ta ligne de base semaine 1"],
           why:"Ce test mesure le temps de réaction pur — sans décision. Il sert de référence pour voir ta progression sur 12 semaines."},
          {icon:"🦾",name:"Test Kinesthésique de Base — Sens du Bras",dose:"5 répétitions — note l'écart",
           steps:["Debout, bras droit tendu à l'horizontale sur le côté — mémorise cette position","Ferme les yeux et baisse le bras","Remonte-le exactement à la même hauteur que tu penses l'avoir mémorisée","Ouvre les yeux — mesure l'écart en degrés ou en cm à hauteur de main","C'est ta ligne de base kinesthésique — elle va s'affiner chaque semaine"],
           why:"Le sens de position du bras (kinesthésie articulaire) est souvent sous-développé même chez les athlètes entraînés. Cet écart initial (souvent 10-15cm) se réduit à 2-3cm avec un entraînement ciblé. Chaque centimètre gagné représente une amélioration directe de la précision du contrôle corporel."},
        ]
      },
      {
        title:"Attention Soutenue — Test de Base",duration:12,color:"var(--orange)",tag:"Attention",
        exos:[
          {icon:"🔢",name:"Comptage à Rebours Continu",dose:"2 minutes sans interruption — note le résultat",
           steps:["Assis, chronomètre lancé pour 2 minutes","Compte à rebours depuis 100 par pas de 3 (100, 97, 94, 91...)","Partenaire note le nombre où tu arrives à la fin des 2 minutes","Si tu perds le fil, reprends depuis le dernier nombre connu — note le nombre de fois que tu t'es perdu"],
           why:"Mesure l'attention soutenue et la mémoire de travail sous contrainte. En combat, ton cerveau gère simultanément ta position, celle de l'adversaire, le score, la fatigue — c'est exactement ce circuit."},
          {icon:"📝",name:"Journal Émotionnel de Départ",dose:"3 minutes d'écriture libre",
           steps:["Sur ton carnet, réponds à ces 3 questions en 3 minutes chrono :", "1 — Quel est ton niveau de stress habituel avant un combat ? (1 à 10)", "2 — Est-ce que tu perds la tête quand tu es en retard au score ?","3 — Qu'est-ce qui te déconcentre le plus sur le tatami ?","Ces réponses sont ta carte de départ — elles vont évoluer"],
           why:"La conscience de soi est le premier outil de régulation émotionnelle. Sans savoir d'où tu pars, tu ne peux pas mesurer où tu arrives."},
        ]
      },
      {
        title:"Respiration & Conscience du Corps",duration:10,color:"var(--green)",tag:"Régulation interne",
        exos:[
          {icon:"🫁",name:"Respiration Lente Guidée — 1ère fois",dose:"5 minutes",
           steps:["Assis ou allongé — ferme les yeux","Inspire par le nez en 4 secondes (gonfle le ventre en premier, puis la poitrine)","Expire par la bouche en 6 secondes (lèvres légèrement pincées, son doux)","Continue 5 minutes sans te forcer — si tu perds le rythme, reprends","Observe : ton esprit a-t-il dérivé ? Combien de fois ?"],
           why:"Active le système nerveux parasympathique (frein naturel du stress). Réduire le rythme respiratoire à moins de 10 cycles/min abaisse le cortisol et améliore l'oxygénation du cortex préfrontal — la zone de la prise de décision."},
          {icon:"🧠",name:"Scan Corporel Rapide",dose:"3 minutes",
           steps:["Après la respiration, garde les yeux fermés","Remonte lentement du bas des pieds jusqu'au sommet du crâne","Sens : où est-ce qu'il y a de la tension ? De la chaleur ? De la lourdeur ?","Ne cherche pas à changer quoi que ce soit — juste observer et nommer","Note 2 zones du corps où tu stockes du stress"],
           why:"L'interoception (la conscience des signaux internes du corps) est l'une des compétences les plus entraînables. Les athlètes qui lisent mieux leurs propres signaux régulent mieux leur état sous pression."},
        ]
      },
    ]
  },
  2:{
    title:"Entrées Visuelles — Entraîner les Yeux",
    goal:"Ton cerveau reçoit 80% de ses informations par les yeux. Entraîner la vision, c'est entraîner la décision. Tout se fait à la maison.",
    seances:[
      {
        title:"Vision Périphérique",duration:15,color:"var(--red)",tag:"Entrée visuelle",
        exos:[
          {icon:"👁",name:"Expansion du Champ Visuel",dose:"3 × 3 minutes",
           steps:["Assis, fixe un point droit devant toi (un objet sur le mur) — ne bouge PAS les yeux","Partenaire déplace lentement sa main sur les côtés, au-dessus et en-dessous","Dès que tu détectes le mouvement en vision périphérique, dis 'là'","Essaie d'étendre progressivement la zone que tu peux détecter sans bouger les yeux","Progresser : partenaire lève ou baisse le nombre de doigts — tu nommes le nombre"],
           why:"La vision périphérique est le système de détection rapide du cerveau. Elle traite le mouvement 3× plus vite que la vision centrale. L'entraîner élargit littéralement ta fenêtre de perception de l'adversaire."},
          {icon:"🎯",name:"Tracking — Suivre Sans Perdre",dose:"4 × 2 minutes",
           steps:["Partenaire tient un stylo et le déplace lentement dans l'espace (haut, bas, droite, gauche, diagonales)","Tu suis le stylo avec les yeux UNIQUEMENT — tête fixe","Partenaire accélère progressivement","Variante : deux objets dans chaque main — tu dois suivre les deux simultanément"],
           why:"Développe la coordination oeil-cerveau et la capacité à suivre plusieurs éléments en même temps — utile pour lire simultanément la posture, les mains et les pieds d'un adversaire."},
        ]
      },
      {
        title:"Traitement Visuel Rapide",duration:15,color:"var(--orange)",tag:"Décision visuelle",
        exos:[
          {icon:"🃏",name:"Stroop des Cartes",dose:"4 séries × 8 cartes",
           steps:["Partenaire retourne des cartes une par une rapidement","Règle : si la carte est rouge ET un chiffre pair = frappe dans les mains","Si la carte est noire OU un chiffre impair = reste immobile","Ton cerveau doit traiter deux informations en même temps avant d'agir","Note le % de bonnes réponses — objectif semaine 2 : 70%+"],
           why:"C'est un exercice de contrôle inhibiteur — forcer le cerveau à évaluer avant d'agir plutôt que de réagir par automatisme. Développe exactement la qualité 'Voir → Choisir → Agir'."},
          {icon:"⚡",name:"Flash et Mémorisation",dose:"5 répétitions",
           steps:["Partenaire dispose 5 objets sur une table","Tu les regardes pendant 5 secondes puis tu te retournes","Tu dois nommer les 5 objets dans l'ordre où tu les as vus","Augmenter à 7 objets quand tu réussis 5 à la suite","Variante : partenaire enlève ou déplace 1 objet — tu identifies lequel"],
           why:"Entraîne la mémoire visuelle à court terme (working memory visuelle). En combat, mémoriser rapidement la posture et les positions de l'adversaire est une compétence critique."},
        ]
      },
      {
        title:"Lecture de Signaux Fins",duration:12,color:"var(--green)",tag:"Anticipation visuelle",
        exos:[
          {icon:"🕵️",name:"Observation de Micro-Mouvements",dose:"10 minutes",
           steps:["Partenaire est assis en face de toi, bras le long du corps","Il va initier un mouvement de bras très lentement (lever la main droite)","Tu dois dire 'maintenant' au moment précis où tu détectes l'intention de mouvement (avant que le bras parte vraiment)","Répète 15 fois — note à quel moment tu détectes (très tôt / juste / trop tard)","Objectif : détecter l'intention avant le mouvement"],
           why:"Les micro-mouvements corporels précèdent toujours l'action visible de 0.2 à 0.4 secondes. Entraîner la détection de ces signaux faibles, c'est se créer une avance sur l'adversaire sans qu'il le sache."},
        ]
      },
    ]
  },
  3:{
    title:"Auditif, Tactile & Kinesthésique",
    goal:"Les yeux ne sont pas la seule entrée. Entraîner les oreilles, la peau et le sens du mouvement — trois canaux que la plupart des athlètes n'ont jamais entraînés consciemment.",
    seances:[
      {
        title:"Réaction Auditive",duration:15,color:"var(--red)",tag:"Entrée auditive",
        exos:[
          {icon:"👂",name:"Localisation Sonore",dose:"3 × 10 répétitions",
           steps:["Yeux fermés — assis au milieu de la pièce","Partenaire claque des doigts à différents endroits autour de toi (gauche, droite, devant, derrière, haut, bas)","Tu pointes immédiatement dans la direction du son","Note les erreurs — les zones qui trompent le plus ton cerveau","Progresser : partenaire claque deux fois dans des endroits différents — tu dois pointer les deux dans l'ordre"],
           why:"Le cortex auditif traite les sons directionnels en moins de 20 millisecondes. Entraîner la localisation sonore affine le système de détection rapide et complémente la vision — deux systèmes actifs valent mieux qu'un."},
          {icon:"⚡",name:"Réaction Auditive Go/No-Go",dose:"4 séries × 10 signaux",
           steps:["Partenaire dit des mots au rythme d'environ 1 par seconde","Règle : si c'est un animal = tu frappes dans les mains, si c'est autre chose = tu restes immobile","Partenaire accélère progressivement le rythme","Variante : inventer d'autres catégories (couleur chaud/froid, sport/nourriture...)","Note le % de bonnes réponses"],
           why:"La réaction auditive est en moyenne 40ms plus rapide que la réaction visuelle. L'entraîner intensifie la voie nerveuse son → décision → mouvement, utile dès que l'adversaire fait un bruit, crie, ou que l'arbitre siffle."},
        ]
      },
      {
        title:"Tactile & Kinesthésique — Sentir pour Agir",duration:15,color:"var(--orange)",tag:"Kinesthésique",

// ═══════════════════════════════════════════════
// STATE & STORAGE
// ═══════════════════════════════════════════════
const KEY=(w,s)=>`tjNeuro_w${w}_s${s}`;
const FKEY=(w,q)=>`tjNeuro_fb_w${w}_q${q}`;
let currentWeek=parseInt(localStorage.getItem('tjNeuro_currentWeek')||'1');

function saveJudokaName(v){localStorage.setItem('tjNeuro_judoka',v)}
function getJudokaName(){return localStorage.getItem('tjNeuro_judoka')||'Anonyme'}

function isSeanceDone(w,s){return localStorage.getItem(KEY(w,s))==='1'}
function setSeanceDone(w,s,v){
  localStorage.setItem(KEY(w,s),v?'1':'0');
  localStorage.setItem('tjNeuro_currentWeek',currentWeek);
  updateGlobalProgress();
  updateDashboard();
  updateWeekProgress();
}
function getFeedback(w,q){return localStorage.getItem(FKEY(w,q))||''}
function setFeedback(w,q,v){localStorage.setItem(FKEY(w,q),v)}

function totalSeances(){
  return Object.values(PROGRAM).reduce((a,w)=>a+w.seances.length,0);
}
function doneSeances(){
  let n=0;
  for(let w=1;w<=12;w++){
    const week=PROGRAM[w];
    week.seances.forEach((_,i)=>{if(isSeanceDone(w,i))n++});
  }
  return n;
}
function weekDone(w){
  const week=PROGRAM[w];
  return week.seances.every((_,i)=>isSeanceDone(w,i));
}
function weekProgress(w){
  const week=PROGRAM[w];
  const done=week.seances.filter((_,i)=>isSeanceDone(w,i)).length;
  return {done,total:week.seances.length,pct:Math.round(done/week.seances.length*100)};
}

function getPhase(w){
  return PHASES.find(p=>p.weeks.includes(w));
}

// ═══════════════════════════════════════════════
// RENDER FUNCTIONS
// ═══════════════════════════════════════════════
function updateGlobalProgress(){
  const done=doneSeances(),total=totalSeances();
  const pct=Math.round(done/total*100);
  document.getElementById('global-fill').style.width=pct+'%';
  document.getElementById('global-pct').textContent=pct+'%';
}

function updateDashboard(){
  const grid=document.getElementById('dash-grid');
  grid.innerHTML='';
  for(let w=1;w<=12;w++){
    const done=weekDone(w);
    const isCur=w===currentWeek;
    const el=document.createElement('div');
    el.className='dash-week'+(isCur?' current-dash':'')+(done?' done-dash':'');
    el.innerHTML=done?`<span class="dash-check">✓</span><span>${w}</span>`:`<span>${w}</span>`;
    el.title=`Semaine ${w}: ${PROGRAM[w].title}`;
    el.onclick=()=>goToWeek(w);
    grid.appendChild(el);
  }
}

function updateWeekProgress(){
  const {done,total,pct}=weekProgress(currentWeek);
  const fill=document.getElementById('wpfill');
  const label=document.getElementById('wplabel');
  if(fill)fill.style.width=pct+'%';
  if(label)label.textContent=done+'/'+total;
}

function renderPhaseBar(){
  const bar=document.getElementById('phase-bar');
  bar.innerHTML='';
  PHASES.forEach((phase,pi)=>{
    const div=document.createElement('div');
    const active=phase.weeks.includes(currentWeek);
    div.className='phase-btn'+(active?' active':'');
    div.innerHTML=`<div class="phase-name">${phase.name}</div><div class="phase-weeks">${
      phase.weeks.map(w=>{
        const done=weekDone(w);
        const isCur=w===currentWeek;
        return `<div class="week-dot${isCur?' current':''}${done?' done':''}" onclick="goToWeek(${w})">${w}</div>`;
      }).join('')
    }</div>`;
    div.onclick=(e)=>{if(e.target===div)goToWeek(phase.weeks[0])};
    bar.appendChild(div);
  });
}

function renderWeek(){
  const w=currentWeek;
  const week=PROGRAM[w];
  const phase=getPhase(w);
  const {done,total,pct}=weekProgress(w);
  const content=document.getElementById('week-content');

  let html=`
  <div class="week-header">
    <div class="week-nav">
      <button class="week-nav-btn" onclick="goToWeek(${w-1})" ${w<=1?'disabled':''}>← Sem. ${w-1}</button>
      <div class="week-badge">
        <div class="week-tag">SEMAINE ${w}</div>
        <div class="phase-tag">${phase.name}</div>
      </div>
      <button class="week-nav-btn" onclick="goToWeek(${w+1})" ${w>=12?'disabled':''}>Sem. ${w+1} →</button>
    </div>
    <div class="week-title">${week.title}</div>
    <div class="week-goal">${week.goal}</div>
    <div class="week-progress-row">
      <span style="font-size:11px;color:var(--gray);font-weight:700;white-space:nowrap">SÉANCES</span>
      <div class="week-progress-bar"><div class="week-progress-fill" id="wpfill" style="width:${pct}%"></div></div>
      <span class="week-progress-label" id="wplabel">${done}/${total}</span>
    </div>
  </div>`;

  // Séances
  week.seances.forEach((seance,si)=>{
    const done=isSeanceDone(w,si);
    const seanceColors={0:'var(--red)',1:'var(--orange)',2:'var(--green)',3:'var(--orange)'};
    const color=seance.color||seanceColors[si]||'var(--red)';
    const totalMin=seance.duration;

    html+=`<div class="seance-card" id="seance-${si}">
      <div class="seance-header" onclick="toggleSeance(${si})">
        <div class="seance-num" style="background:${color}">${si+1}</div>
        <div class="seance-info">
          <div class="seance-title">Séance ${si+1} — ${seance.title}</div>
          <div class="seance-meta">
            <span class="seance-time">⏱ ${totalMin} min</span>
            <span class="seance-tag-pill" style="background:${color}22;color:${color}">${seance.tag}</span>
          </div>
        </div>
        <div class="seance-check" onclick="event.stopPropagation()">
          <input type="checkbox" ${done?'checked':''} onchange="toggleDone(${w},${si},this.checked)" title="Marquer comme terminée"/>
        </div>
        <div class="seance-chevron">▼</div>
      </div>
      <div class="seance-body">
        <div class="exo-list">${seance.exos.map(exo=>renderExo(exo,color)).join('')}</div>
      </div>
    </div>`;
  });

  // Feedback section
  html+=`
  <div class="feedback-section">
    <div class="feedback-title">✍️ Retour Athlète — Semaine ${w}</div>
    <div class="feedback-subtitle">
      À la fin de ta dernière séance de la semaine, réponds à ces 3 questions dans ta
      <strong style="color:var(--orange)">feuille de retour athlète de la semaine</strong> et remets-la à ton coach.
    </div>
    <div class="feedback-q">💡 1 — Qu'est-ce que j'ai ressenti de différent sur le tatami cette semaine ?</div>
    <div class="feedback-q">📊 2 — Quelle séance ou quel exercice a eu le plus d'effet sur moi ?</div>
    <div class="feedback-q">🎯 3 — Mon intention neuro pour la semaine prochaine :</div>
  </div>`;

  content.innerHTML=html;

  // Open first incomplete seance automatically
  const firstIncomplete=week.seances.findIndex((_,i)=>!isSeanceDone(w,i));
  const toOpen=firstIncomplete>=0?firstIncomplete:0;
  openSeance(toOpen);
}

function renderExo(exo,accentColor){
  return `<div class="exo" style="border-left-color:${accentColor}">
    <div class="exo-header">
      <div class="exo-icon">${exo.icon}</div>
      <div>
        <div class="exo-name">${exo.name}</div>
        <div class="exo-dose">${exo.dose}</div>
      </div>
    </div>
    <ul class="exo-steps">
      ${exo.steps.map((s,i)=>`<li>
        <span class="exo-step-num" style="background:${accentColor}">${i+1}</span>
        <span>${s}</span>
      </li>`).join('')}
    </ul>
    <div class="exo-why"><strong>Ce que ça développe :</strong> ${exo.why}</div>
  </div>`;
}

// ═══════════════════════════════════════════════
// INTERACTIONS
// ═══════════════════════════════════════════════
function toggleSeance(si){
  const card=document.getElementById('seance-'+si);
  const isOpen=card.classList.contains('open');
  // Close all
  document.querySelectorAll('.seance-card').forEach(c=>c.classList.remove('open'));
  if(!isOpen)card.classList.add('open');
}

function openSeance(si){
  const card=document.getElementById('seance-'+si);
  if(card)card.classList.add('open');
}

function toggleDone(w,si,checked){
  setSeanceDone(w,si,checked);
  updateWeekProgress();
  updateDashboard();
  renderPhaseBar();
  // Check if all done → suggest next week
  if(weekDone(w)&&w<12){
    setTimeout(()=>{
      if(confirm(`Super ! Semaine ${w} complétée ✓\nPasser à la Semaine ${w+1} ?`)){
        goToWeek(w+1);
      }
    },300);
  }
}

function goToWeek(w){
  if(w<1||w>12)return;
  currentWeek=w;
  localStorage.setItem('tjNeuro_currentWeek',w);
  renderPhaseBar();
  renderWeek();
  updateWeekProgress();
  updateGlobalProgress();
  updateDashboard();
  window.scrollTo({top:0,behavior:'smooth'});
}


async function sendToSheets(w,q1,q2,q3){
  if(!SHEETS_URL||SHEETS_URL==='COLLE_TON_URL_ICI')return;

  const dot=document.getElementById('sheets-dot');
  dot.className='sheets-dot loading';

  // Calculer la progression
  const total=totalSeances();
  const done=doneSeances();
  const pctGlobal=Math.round(done/total*100);
  const wp=weekProgress(w);
  const phase=getPhase(w);

  // Progression par semaine
  const weekProg={};
  for(let ww=1;ww<=12;ww++){
    weekProg[ww]=weekProgress(ww).pct;
  }

  const payload={
    judoka:getJudokaName(),
    semaine:w,
    phase:phase?phase.name:'',
    seancesDone:wp.done,
    seancesTotal:wp.total,
    pctSemaine:wp.pct,
    pctGlobal,
    q1,q2,q3,
    weekProgress:weekProg
  };

  try{
    await fetch(SHEETS_URL,{
      method:'POST',
      mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(payload)
    });
    dot.className='sheets-dot ok';
    setTimeout(()=>{dot.className='sheets-dot'},4000);
  }catch(err){
    dot.className='sheets-dot err';
    setTimeout(()=>{dot.className='sheets-dot'},4000);
    console.error('Sheets error:',err);
  }
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
function init(){
  // Restore judoka name
  const savedName=localStorage.getItem('tjNeuro_judoka');
  if(savedName){
    const input=document.getElementById('judoka-name');
    if(input)input.value=savedName;
  }
  updateGlobalProgress();
  updateDashboard();
  renderPhaseBar();
  renderWeek();
}

init();
</script>
